<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
    <style>
      div {
        width: 100px;
        height: 100px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        text-transform: uppercase;
        position: absolute;
      }
      .parent {
        width: 500px;
        height: 400px;
        background-image: url("water.jpg");
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
      }

      .child1 {
        background-color: green;
        border: 3px solid black;
        top: 50%;
        left: 50%;
      }
      .child2 {
        background-color: rgb(255, 217, 0);
        border: 3px solid black;
        top: 50%;
        right: 50%;
      }
      .child3 {
        background-color: rgb(0, 238, 255);
        border: 3px solid black;
        z-index: 1;
      }
      .child4 {
        background-color: rgb(255, 0, 0);
        border: 3px solid black;
        bottom: 50%;
        left: 50%;
      }
      .child5 {
        background-color: rgb(255, 0, 208);
        border: 3px solid black;
        bottom: 50%;
        right: 50%;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="child1">Top left</div>
      <div class="child2">Top right</div>
      <div class="child3">center</div>
      <div class="child4">bottom left</div>
      <div class="child5">bottom right</div>
    </div>
  </body>
</html>

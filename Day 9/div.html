<html>

<head>

    <title>Divisions</title>

    <style>
        body {
            margin: 0%;
        }

        .section1 {
            width: 100%;
            height: 20%;
            background-color: blue;
        }

        .section2 {
            width: 100%;
            height: 50%;
            padding: 1px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: green;
            border: 2px solid black;
        }

        .child1 {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 60%;
            height: 70%;
            background-color: yellow;
            border: 4px;
            border: 1px solid black;
        }

        .card1 {
            background-color: red;
            border: 2px solid black;
            display: flex;
            justify-content: space-evenly;
            align-items: center;

        }

        .ca1ch1 {
            background-color: yellow;
            border: 2px solid black;
        }

        .ca1ch2 {
            background-color: yellow;
            border: 2px solid black;
        }

        .card2 {
            background-color: rgb(171, 130, 238);
            border: 2px solid black;
        }

        .ca2ch1 {
            background-color: aqua;
            border: 4px;
        }

        .ca2ch2 {
            background-color: aqua;
            border: 4px;
        }

        .ca2ch3 {
            background-color: aqua;
            border: 4px;
        }

        .ca2ch4 {
            background-color: aqua;
            border: 4px;
        }

        .ca2ch5 {
            background-color: aqua;
            border: 4px;
        }

        .ca2ch6 {
            background-color: aqua;
            border: 4px;
        }

        .card3 {
            background-color: brown;
            border: 4px;
        }

        .ca3ch1 {
            background-color: yellow;
            border: 4px;
        }

        .ca3ch2 {
            background-color: yellow;
            border: 4px;
        }

        .ca3ch3 {
            background-color: yellow;
            border: 4px;
        }

        .child2 {
            width: 40%;
            height: 70%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background-color: hotpink;
            border: 1px solid black;
        }

        .ch2ch1 {
            height: 50px;
            width: 100px;
            padding-left: 5%;
            padding-right: 5%;
            padding-top: 5%;
            background-color: orange;
            border: 1px solid black;

        }

        .ch2ch2 {
            height: 50px;
            width: 100px;
            padding: 20px;
            background-color: pink;
            border: 1px solid black;
        }
    </style>

</head>

<body>

    <div class="section1"></div>
    <div class="section2">
        <div class="child1">
            <div class="card1">
                <div class="ca1ch1"></div>
                <div class="ca1ch2"></div>
            </div>
            <div class="card2">
                <div class="ca2ch1"></div>
                <div class="ca2ch2"></div>
                <div class="ca2ch3"></div>
                <div class="ca2ch4"></div>
                <div class="ca2ch5"></div>
                <div class="ca2ch6"></div>
            </div>
            <div class="card3">
                <div class="ca3ch1"></div>
                <div class="ca3ch2"></div>
                <div class="ca3ch3"></div>
            </div>
        </div>
        <div class="child2">
            <div class="ch2ch1"></div>
            <div class="ch2ch2"></div>
        </div>
    </div>

</body>

</html>

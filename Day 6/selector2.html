<html>
    <head>
        <title>selector2</title>
        <style>
            h3~p{
                color: blue;
            }
            h3+p{
                color: red;
            }
        </style>
    </head>
    <body>
        <h3>This is a heading</h3>
        <p>this is para 1</p>
        <p>this is para 2</p>
        <p>this is para 3</p>
        <p>this is para 4</p>
    </body>
</html>

<html>
    <head>
        <style>
            a{
                color: blue;
                font-size: 30px;
                text-transform: uppercase;
                text-decoration: none;
            }
            a:hover{
                background-color: aqua;
                color: red;
            }
            a:active{
                color: yellow;
            }
            h1:hover{
                color: yellow;
                background-color: green;
                cursor: pointer;
            }
            h1::before{
                content: "👉";
            }
            h1::after{
                content: "👑";
            }
            h2::before{
                content: "👍";
            }
            h2::after{
                content: "👌";
            }
        </style>
    </head>
    <body>
        <h1>Hemanth</h1>
        <a href="https://www.facebook.com">Click on</a>
        <h2></h2>
        <h2></h2>
        <h2></h2>
        <h2></h2>
        <h2></h2>
    </body>
</html>

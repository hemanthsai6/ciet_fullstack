<html>
    <head>
        <title>Registration Form</title>
    </head>
    <body>
        <table align="center" border="2">
            <form>
            <tr><td colspan="2">Student Registration</td></tr>
            <tr><th>Name</th><td><input type="text" name="name"></td></tr>
            <tr><th>Age</th><td><input type="number" name="age"></td></tr>
            <tr><th>Email</th><td><input type="email" name="email"></td></tr>
            <tr><th>Mobile</th><td><input type="tel" name="mobile"></td></tr>
            <tr><th>Gender</th><td><input type="radio" name="gender" id="m" value="Male">
                                    <label for="m">Male:</label>
                                    <input type="radio" name="gender" id="f" value="Female">
                                    <label for="f">Female:</label><br></td></tr>
            <tr><th>Languages Known</th><td><input type="checkbox" name="lk" id="t" value="Telugu">
                                            <label for="t">Telugu</label>
                                            <input type="checkbox" name="lk" id="h" value="Hindi">
                                            <label for="h">Hindi</label><br>
                                            <input type="checkbox" name="lk" id="e" value="English">
                                            <label for="e">English</label><br></td></tr>
            <tr><th>DOB:</th><td><input type="date" id="d">
            <tr><td align="center"><input type="reset"></td><td align="center"><input type="submit"></td></tr>                         
        <form></table>
    </body>
</html>

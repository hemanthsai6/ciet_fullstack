<html>
  <head>
    <title>Forms</title>
  </head>
  <body>
    <h3>Form:</h3>
    <form>
      <fieldset>
        <legend>Information</legend>
        <label for="user">User:</label>
        <input type="text" name="user" id="user" /> <br />
        <label for="email">Email:</label>
        <input type="email" name="email" id="email" />
        <input type="submit" />
      </fieldset>
    </form>
  </body>
</html>

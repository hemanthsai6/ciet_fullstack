<html>
  <head>
    <title></title>
  </head>
  <body>
    <form>
      <input type="text" name="name" placeholder="enter your name" required="" /> <br />
      <input type="email" name="email" placeholder="enter email" required="" /><br /><br />
      <label>Enter your gender:</label><br>
      <input type="radio" name="gender" id="m" value="Male">
      <label for="m">Male:</label><br>
      <input type="radio" name="gender" id="f" value="Female">
      <label for="f">Female:</label><br>
      <label>Skills:</label>
      <input type="checkbox" name="skill" id="p" value="Python">
      <label for="p">Python</label>
      <input type="checkbox" name="skill" id="j" value="Java">
      <label for="j">Java</label><br>
      <input type="search" placeholder="search here"><br>
      <input type="date" id="d" ><br>
      <label for="d">Enter DOB:</label>
      <input type="tel"placeholder="enter num"><br>
      <input type="number" name="age" placeholder="enter age"><br>
      <input type="url" name="u" placeholder="enter url"><br>
      <input type="range" name="r" min="0" max="100"><br>
      <input type="color" name="c"><br>
      <input type="week" name="w"><br>
      <input type="datetime-local" name="y"><br>
      <input type="file" name="f"><br>
      <label for="n">Nationality:</label>
      <select name="nationality" id="n">
      <option value="India">India</option>
      <option value="Australia">Australia</option>
      <option value="NewZealand selected">NewZealand</option>  </select> <br>
      <label for="fb">Your feedback:</label><br>
      <textarea name="feedback" id="fb" rows="10" cols="20"></textarea>    
      <input type="reset">
      <input type="submit">
      <!-- <button type="submit">Submit</button> -->
    </form>
  </body>
</html>
